<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teste GPS</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>
body{
    background:#f5f5f5;
}

.card{
    max-width:700px;
    margin:auto;
    margin-top:40px;
}
</style></head>
<body><div class="container"><div class="card shadow"><div class="card-header bg-success text-white">
Teste de GPS Real
</div><div class="card-body"><button class="btn btn-success mb-3" onclick="iniciarGPS()">
Iniciar GPS
</button><div id="status" class="alert alert-secondary">
Aguardando...
</div><table class="table"><tr>
<td>Latitude</td>
<td id="lat">-</td>
</tr><tr>
<td>Longitude</td>
<td id="lng">-</td>
</tr><tr>
<td>Precisão</td>
<td id="acc">-</td>
</tr><tr>
<td>Horário</td>
<td id="hora">-</td>
</tr></table></div></div></div><script>

let watchId = null;

function iniciarGPS(){

    if(!navigator.geolocation){

        document.getElementById("status").innerHTML =
        "Seu navegador não suporta Geolocation.";

        return;
    }

    document.getElementById("status").innerHTML =
    "Tentando obter GPS...";

    watchId = navigator.geolocation.watchPosition(

        function(pos){

            document.getElementById("lat").innerText =
            pos.coords.latitude;

            document.getElementById("lng").innerText =
            pos.coords.longitude;

            document.getElementById("acc").innerText =
            pos.coords.accuracy + " metros";

            document.getElementById("hora").innerText =
            new Date().toLocaleString();

            document.getElementById("status").innerHTML =
            "GPS conectado com sucesso.";

        },

        function(err){

            document.getElementById("status").innerHTML =
            "Erro " + err.code + ": " + err.message;

        },

        {
            enableHighAccuracy:true,
            timeout:30000,
            maximumAge:0
        }

    );

}

</script></body>
</html>
