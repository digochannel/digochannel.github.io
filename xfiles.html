<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Sistema de Diligências</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><style>
body{
    background:#f4f6f9;
}

.navbar{
    background:#198754;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
}

.kpi{
    font-size:1.6rem;
    font-weight:700;
}

.btn{
    transition:.2s;
}

.btn:hover{
    transform:translateY(-2px);
}

.table-responsive{
    max-height:500px;
}

footer{
    margin-top:30px;
    padding:20px;
    text-align:center;
    color:#666;
}
</style></head>
<body><nav class="navbar navbar-dark">
<div class="container-fluid"><span class="navbar-brand">
<i class="bi bi-building"></i>
 Cartório Demonstrativo
</span><div>
<button class="btn btn-light btn-sm" onclick="exportarCSV()">
<i class="bi bi-filetype-csv"></i>
 CSV
</button>
</div></div>
</nav><div class="container py-4"><div class="row g-3"><div class="col-md-3">
<div class="card p-3">
<div class="text-muted">Pontos</div>
<div id="totalPontos" class="kpi">0</div>
</div>
</div><div class="col-md-3">
<div class="card p-3">
<div class="text-muted">Quilometragem</div>
<div id="kmTotal" class="kpi">0 km</div>
</div>
</div><div class="col-md-3">
<div class="card p-3">
<div class="text-muted">Status</div>
<div id="statusAtual" class="kpi">Parado</div>
</div>
</div><div class="col-md-3">
<div class="card p-3">
<div class="text-muted">Precisão GPS</div>
<div id="precisaoAtual" class="kpi">-</div>
</div>
</div></div><div class="card mt-4 p-4"><h4 class="mb-3">
<i class="bi bi-geo-alt-fill"></i>
 Controle de Diligência
</h4><div class="d-flex flex-wrap gap-2"><button class="btn btn-success" onclick="registrarEvento('INÍCIO')">
<i class="bi bi-play-fill"></i>
 Iniciar
</button><button class="btn btn-primary" onclick="registrarEvento('ENTREGUE')">
<i class="bi bi-check-circle-fill"></i>
 Entregue
</button><button class="btn btn-warning" onclick="registrarEvento('PENDÊNCIA')">
<i class="bi bi-exclamation-circle-fill"></i>
 Pendência
</button><button class="btn btn-danger" onclick="limparTudo()">
<i class="bi bi-arrow-clockwise"></i>
 Reiniciar
</button></div><div id="mensagem" class="alert alert-light mt-3 mb-0">
Sistema pronto.
</div></div><div class="card mt-4 p-4"><h5>
<i class="bi bi-clock-history"></i>
 Histórico
</h5><div class="table-responsive"><table class="table table-striped"><thead><tr>
<th>#</th>
<th>Ação</th>
<th>Data/Hora</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Precisão</th>
<th>KM Acum.</th>
</tr></thead><tbody id="historico"></tbody></table></div></div></div><footer>
Sistema Demonstrativo de Diligências
</footer><script>

let registros =
JSON.parse(localStorage.getItem("registros")) || [];

function salvar(){
    localStorage.setItem(
        "registros",
        JSON.stringify(registros)
    );
}

function rad(x){
    return x * Math.PI / 180;
}

function distanciaKm(lat1, lon1, lat2, lon2){

    const R = 6371;

    const dLat = rad(lat2-lat1);
    const dLon = rad(lon2-lon1);

    const a =
    Math.sin(dLat/2)**2 +
    Math.cos(rad(lat1)) *
    Math.cos(rad(lat2)) *
    Math.sin(dLon/2)**2;

    return R * (
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        )
    );
}

async function registrarEvento(tipo){

    document.getElementById("mensagem").innerHTML =
    "Obtendo GPS...";

    navigator.geolocation.getCurrentPosition(

        function(pos){

            let km = 0;

            if(registros.length){

                const ultimo =
                registros[registros.length-1];

                km =
                distanciaKm(
                    ultimo.lat,
                    ultimo.lng,
                    pos.coords.latitude,
                    pos.coords.longitude
                );

            }

            registros.push({

                acao:tipo,

                data:new Date().toLocaleString(),

                lat:pos.coords.latitude,

                lng:pos.coords.longitude,

                accuracy:
                Math.round(
                pos.coords.accuracy
                ),

                km

            });

            salvar();

            atualizarTela();

            document.getElementById(
            "statusAtual"
            ).innerText = tipo;

            document.getElementById(
            "precisaoAtual"
            ).innerText =
            Math.round(
            pos.coords.accuracy
            ) + " m";

            document.getElementById(
            "mensagem"
            ).innerHTML =
            "GPS registrado com sucesso.";

        },

        function(err){

            document.getElementById(
            "mensagem"
            ).innerHTML =
            "Erro GPS: " + err.message;

        },

        {
            enableHighAccuracy:true,
            timeout:30000,
            maximumAge:0
        }

    );

}

function atualizarTela(){

    const tabela =
    document.getElementById("historico");

    tabela.innerHTML = "";

    let kmTotal = 0;

    registros.forEach((r,i)=>{

        kmTotal += r.km;

        tabela.innerHTML += `
        <tr>
        <td>${i+1}</td>
        <td>${r.acao}</td>
        <td>${r.data}</td>
        <td>${r.lat.toFixed(6)}</td>
        <td>${r.lng.toFixed(6)}</td>
        <td>${r.accuracy} m</td>
        <td>${kmTotal.toFixed(2)} km</td>
        </tr>
        `;
    });

    document.getElementById(
    "totalPontos"
    ).innerText =
    registros.length;

    document.getElementById(
    "kmTotal"
    ).innerText =
    kmTotal.toFixed(2) + " km";
}

function exportarCSV(){

    let csv =
    "Acao,Data,Latitude,Longitude,Precisao,KM\n";

    registros.forEach(r=>{

        csv +=
        `"${r.acao}","${r.data}",${r.lat},${r.lng},${r.accuracy},${r.km}\n`;

    });

    const blob =
    new Blob(
    [csv],
    {type:'text/csv'}
    );

    const a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "relatorio.csv";

    a.click();
}

function limparTudo(){

    if(
    !confirm(
    "Apagar todos os registros?"
    )
    ) return;

    registros = [];

    salvar();

    atualizarTela();

    document.getElementById(
    "statusAtual"
    ).innerText = "Parado";

    document.getElementById(
    "precisaoAtual"
    ).innerText = "-";

}

atualizarTela();

</script></body>
</html>
