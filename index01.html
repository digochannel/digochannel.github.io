<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cartório Notarial Porto Alegre - Sistema de Intimações</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
    background:#f5f7fa;
}

.navbar{
    background:#198754 !important;
}

.navbar .nav-link,
.navbar-brand{
    color:#fff !important;
    font-weight:500;
}

.toolbar{
    background:#fff;
    border-radius:12px;
    padding:15px;
    box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.card-indicador{
    border:none;
    border-radius:14px;
    color:#fff;
}

.table{
    background:#fff;
}

.badge{
    font-size:.85rem;
}

.btn-action{
    transition:.2s;
}

.btn-action:hover{
    transform:translateY(-2px);
}

footer{
    background:#198754;
    color:#fff;
}

#gpsInfo{
    font-size:.9rem;
}

</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">

<div class="container">

<a class="navbar-brand" href="#">
<i class="bi bi-building-fill-check"></i>
 Cartório Notarial Porto Alegre
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#" onclick="exportarCSV()">
<i class="bi bi-filetype-csv"></i>
 CSV
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" onclick="exportarPDF()">
<i class="bi bi-file-earmark-pdf"></i>
 PDF
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" onclick="obterGPS()">
<i class="bi bi-geo-alt-fill"></i>
 GPS
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" onclick="relatorioParcial()">
<i class="bi bi-bar-chart-fill"></i>
 Parcial
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" onclick="relatorioDia()">
<i class="bi bi-calendar-check-fill"></i>
 Dia
</a>
</li>

</ul>

</div>

</div>

</nav>

<div class="container py-4">

<div class="toolbar mb-4">

<div class="row g-3">

<div class="col-md-3">
<div class="card bg-primary card-indicador">
<div class="card-body text-center">
<h6>Total</h6>
<h3 id="total">0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success card-indicador">
<div class="card-body text-center">
<h6>Entregues</h6>
<h3 id="entregues">0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-danger card-indicador">
<div class="card-body text-center">
<h6>Pendências</h6>
<h3 id="pendencias">0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-secondary card-indicador">
<div class="card-body text-center">
<h6>Aguardando</h6>
<h3 id="aguardando">0</h3>
</div>
</div>
</div>

</div>

<div id="gpsInfo" class="mt-3"></div>

</div>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-success">

<tr>
<th>Prot.</th>
<th>Nome</th>
<th>Endereço</th>
<th>Status</th>
<th width="320">Ações</th>
</tr>

</thead>

<tbody id="tabelaIntimacoes"></tbody>

</table>

</div>

</div>

<footer class="text-center py-4">

<strong>Cartório Notarial Porto Alegre</strong>

<br>

Sistema Eletrônico de Controle de Intimações

</footer>

<div class="modal fade" id="modalConfirmacao">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Confirmar ação
</h5>

<button class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body"
id="textoModal">
</div>

<div class="modal-footer">

<button class="btn btn-secondary"
data-bs-dismiss="modal">
Cancelar
</button>

<button class="btn btn-primary"
id="btnConfirmar">
Confirmar
</button>

</div>

</div>

</div>

</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">

<div class="toast" id="toastSucesso">

<div class="toast-header">

<strong class="me-auto">
Sistema
</strong>

<button
class="btn-close"
data-bs-dismiss="toast">
</button>

</div>

<div class="toast-body">
Operação realizada com sucesso.
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

let registros = [];
let indiceAtual = null;
let statusAtual = null;

const modal =
new bootstrap.Modal(
document.getElementById("modalConfirmacao")
);

const toast =
new bootstrap.Toast(
document.getElementById("toastSucesso")
);

async function carregarDados(){

const resposta =
await fetch("intimacoes.json");

const dados =
await resposta.json();

const salvo =
localStorage.getItem("intimacoes");

if(salvo){

registros = JSON.parse(salvo);

}else{

registros =
dados.map((item,index)=>({

...item,

protocolo:
String(index+1)
.padStart(5,"0"),

status:"aguardando"

}));

}

renderizar();

}

function salvar(){

localStorage.setItem(
"intimacoes",
JSON.stringify(registros)
);

}

function atualizarIndicadores(){

document.getElementById("total")
.textContent = registros.length;

document.getElementById("entregues")
.textContent =
registros.filter(
r=>r.status==="entregue"
).length;

document.getElementById("pendencias")
.textContent =
registros.filter(
r=>r.status==="pendente"
).length;

document.getElementById("aguardando")
.textContent =
registros.filter(
r=>r.status==="aguardando"
).length;

}

function badge(status){

if(status==="entregue")
return '<span class="badge bg-success">ENTREGUE</span>';

if(status==="pendente")
return '<span class="badge bg-danger">PENDÊNCIA</span>';

return '<span class="badge bg-secondary">AGUARDANDO</span>';

}

function renderizar(){

atualizarIndicadores();

const tabela =
document.getElementById(
"tabelaIntimacoes"
);

tabela.innerHTML = "";

registros.forEach((item,index)=>{

tabela.innerHTML += `

<tr>

<td>${item.protocolo}</td>

<td>${item.nome}</td>

<td>
${item.logradouro},
${item.numero}
</td>

<td>${badge(item.status)}</td>

<td>

<div class="btn-group">

<button
class="btn btn-success btn-sm btn-action"
onclick="abrirModal(${index},'entregue')">

<i class="bi bi-check-circle"></i>

</button>

<button
class="btn btn-danger btn-sm btn-action"
onclick="abrirModal(${index},'pendente')">

<i class="bi bi-exclamation-triangle"></i>

</button>

<button
class="btn btn-secondary btn-sm btn-action"
onclick="abrirModal(${index},'aguardando')">

<i class="bi bi-arrow-clockwise"></i>

</button>

</div>

</td>

</tr>

`;

});

}

function abrirModal(indice,status){

indiceAtual = indice;
statusAtual = status;

const mensagens = {

entregue:
"Confirmar entrega da intimação?",

pendente:
"Registrar pendência?",

aguardando:
"Reiniciar diligência?"

};

document.getElementById(
"textoModal"
).innerText =
mensagens[status];

modal.show();

}

document
.getElementById("btnConfirmar")
.addEventListener("click",()=>{

registros[indiceAtual]
.status = statusAtual;

salvar();

renderizar();

modal.hide();

toast.show();

});

function exportarCSV(){

let csv =
"PROTOCOLO;NOME;STATUS\n";

registros.forEach(r=>{

csv +=
`${r.protocolo};${r.nome};${r.status}\n`;

});

const blob =
new Blob(
[csv],
{type:"text/csv"}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;
a.download =
"intimacoes.csv";

a.click();

}

function exportarPDF(){

const { jsPDF } =
window.jspdf;

const doc =
new jsPDF();

doc.text(
"Relatório de Intimações",
10,
10
);

let y = 20;

registros.forEach(r=>{

doc.text(

`${r.protocolo} - ${r.nome} - ${r.status}`,

10,

y

);

y += 10;

});

doc.save(
"intimacoes.pdf"
);

}

function relatorioParcial(){

alert(

`Entregues: ${
registros.filter(
r=>r.status==="entregue"
).length
}

Pendências: ${
registros.filter(
r=>r.status==="pendente"
).length
}

Aguardando: ${
registros.filter(
r=>r.status==="aguardando"
).length
}`

);

}

function relatorioDia(){

const hoje =
new Date()
.toLocaleDateString("pt-BR");

alert(
"Relatório do dia: " + hoje
);

}

function obterGPS(){

if(!navigator.geolocation){

alert("GPS não suportado");
return;

}

navigator.geolocation
.getCurrentPosition(pos=>{

const lat =
pos.coords.latitude;

const lon =
pos.coords.longitude;

document
.getElementById("gpsInfo")
.innerHTML = `

<strong>GPS Ativo</strong>

<br>

Latitude:
${lat}

<br>

Longitude:
${lon}

<br><br>

<a
target="_blank"
class="btn btn-success btn-sm"

href="https://maps.google.com/?q=${lat},${lon}">

Abrir no Google Maps

</a>

`;

});

}

carregarDados();

</script>

</html>
