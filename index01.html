<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cartório Notarial Porto Alegre - Sistema de Intimações</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#f5f7fa}
.navbar{background:#198754!important}
.navbar .nav-link,.navbar-brand{color:#fff!important;font-weight:500}
.toolbar{background:#fff;border-radius:12px;padding:15px;box-shadow:0 3px 12px rgba(0,0,0,.08)}
.card-indicador{border:none;border-radius:14px;color:#fff}
.table{background:#fff}
.btn-action{transition:.2s}
.btn-action:hover{transform:translateY(-2px)}
footer{background:#198754;color:#fff}
#gpsInfo{font-size:.9rem}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">
<div class="container">

<a class="navbar-brand">
<i class="bi bi-building-fill-check"></i> Cartório Notarial Porto Alegre
</a>

</div>
</nav>

<div class="container py-4">

<div class="toolbar mb-4">
<div class="row g-3">

<div class="col-md-3">
<div class="card bg-primary card-indicador">
<div class="card-body text-center">
<h6>Total</h6>
<h3 id="total">0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success card-indicador">
<div class="card-body text-center">
<h6>Entregues</h6>
<h3 id="entregues">0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-danger card-indicador">
<div class="card-body text-center">
<h6>Pendências</h6>
<h3 id="pendencias">0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-secondary card-indicador">
<div class="card-body text-center">
<h6>Aguardando</h6>
<h3 id="aguardando">0</h3>
</div>
</div>
</div>

</div>
</div>

<div class="table-responsive">
<table class="table table-hover align-middle">
<thead class="table-success">
<tr>
<th>Prot.</th>
<th>Nome</th>
<th>Endereço</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabelaIntimacoes"></tbody>
</table>
</div>

</div>

<footer class="text-center py-4">
<strong>Cartório Notarial Porto Alegre</strong>
</footer>

<script>
let registros = [];

async function carregarDados(){

    try{

        // 🔥 sempre força atualização (evita cache)
        const resposta = await fetch("intimacoes.json?v=" + Date.now());
        const dados = await resposta.json();

        registros = dados.map((item, i)=>({
            protocolo: String(i+1).padStart(5,"0"),
            nome: item.devedor,
            logradouro: item.endereco,
            numero: item.numero,
            status: "aguardando"
        }));

        renderizar();

    } catch(e){
        console.error("Erro ao carregar JSON:", e);
    }

}

function renderizar(){

    const tbody = document.getElementById("tabelaIntimacoes");
    tbody.innerHTML = "";

    let total = registros.length;
    let entregues = 0;
    let pendentes = 0;
    let aguardando = 0;

    registros.forEach(r=>{

        if(r.status==="entregue") entregues++;
        else if(r.status==="pendente") pendentes++;
        else aguardando++;

        tbody.innerHTML += `
        <tr>
            <td>${r.protocolo}</td>
            <td>${r.nome}</td>
            <td>${r.logradouro}, ${r.numero}</td>
            <td>
                <span class="badge bg-secondary">${r.status.toUpperCase()}</span>
            </td>
        </tr>`;
    });

    document.getElementById("total").textContent = total;
    document.getElementById("entregues").textContent = entregues;
    document.getElementById("pendencias").textContent = pendentes;
    document.getElementById("aguardando").textContent = aguardando;
}

// 🔥 auto refresh opcional (atualiza JSON automaticamente)
setInterval(carregarDados, 15000);

carregarDados();
</script>

</body>
</html>
